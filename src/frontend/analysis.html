<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多维度分析 - 校园网行为分析系统</title>
    <link rel="stylesheet" href="css/campus.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="js/api.js"></script>
</head>
<body>
<!-- 导航栏 -->
<div class="daohang">
    <ul>
        <li><a href="dashboard.html">首页</a></li>
        <li><a href="analysis.html" class="active">多维度分析</a></li>
        <li><a href="users.html">用户列表</a></li>
        <li><a href="warning.html">预警管理</a></li>
        <li><a href="profile.html">用户画像</a></li>
    </ul>
</div>

<!-- 主容器 -->
<div class="main-concent">
    <!-- 系统整体指标 -->
    <div class="card">
        <div class="card-header">📊 系统整体指标</div>
        <div class="card-body">
            <div class="analysis-grid">
                <div class="metric-card">
                    <div class="metric-label">总用户数</div>
                    <div class="metric-value" id="totalUsers">0</div>
                </div>
                <div class="metric-card pink">
                    <div class="metric-label">高风险用户</div>
                    <div class="metric-value" id="highRiskCount">0</div>
                </div>
                <div class="metric-card info">
                    <div class="metric-label">平均健康度</div>
                    <div class="metric-value" id="avgHealth">0</div>
                    <div style="font-size: 12px; margin-top: 8px;">/ 100</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 用户搜索 -->
    <div class="card mt-30">
        <div class="card-header">🔍 用户搜索</div>
        <div class="card-body">
            <div style="display: flex; gap: 10px;">
                <input
                        type="text"
                        id="searchInput"
                        placeholder="输入学号或姓名搜索..."
                        style="flex: 1;"
                >
                <button class="btn btn-primary" onclick="searchUser()">搜索</button>
            </div>
        </div>
    </div>

    <!-- 用户详细分析 -->
    <div class="card mt-30">
        <div class="card-header">📈 用户详细分析</div>
        <div class="card-body" id="userAnalysisContainer" style="display: none;">
            <!-- 基本信息和指标 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                <!-- 左侧：基本信息 -->
                <div>
                    <h3>👤 基本信息</h3>
                    <div id="userBasicInfo" style="background: var(--bg-light); padding: 15px; border-radius: 4px; margin-top: 10px;">
                        <!-- 动态填充 -->
                    </div>

                    <h3 style="margin-top: 20px;">📊 多维度指标</h3>
                    <div id="userMetrics" style="display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px;">
                        <!-- 动态填充 -->
                    </div>
                </div>

                <!-- 右侧：雷达图 -->
                <div>
                    <h3>🎯 用户画像雷达图</h3>
                    <div id="userRadarChart" style="height: 400px; margin-top: 10px;"></div>
                </div>
            </div>

            <!-- 分析数据历史 -->
            <h3 style="margin-top: 30px;">📜 分析数据历史</h3>
            <div style="margin-top: 10px; overflow-x: auto;">
                <table class="table">
                    <thead>
                    <tr>
                        <th>分析日期</th>
                        <th>日均上网</th>
                        <th>学习占比</th>
                        <th>门禁次数</th>
                        <th>借阅活跃度</th>
                        <th>健康度</th>
                    </tr>
                    </thead>
                    <tbody id="analysisHistoryTable"></tbody>
                </table>
            </div>
        </div>
        <div id="noUserSelected" class="card-body" style="text-align: center; color: var(--text-light);">
            <p>请搜索用户进行分析</p>
        </div>
    </div>

    <!-- 用户预警信息 -->
    <div class="card mt-30">
        <div class="card-header">⚠️ 用户预警信息</div>
        <div class="card-body">
            <table class="table">
                <thead>
                <tr>
                    <th>预警类型</th>
                    <th>风险级别</th>
                    <th>风险评分</th>
                    <th>描述</th>
                    <th>创建时间</th>
                </tr>
                </thead>
                <tbody id="userWarningsTable">
                <tr>
                    <td colspan="5" style="text-align: center; color: var(--text-light);">
                        请先搜索用户
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div class="footer">
    <p>© 2026 校园网行为分析系统 - 多维度数据分析</p>
</div>

<script src="js/analysis.js"></script>
</body>
</html>
