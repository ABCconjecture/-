<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预警管理 - 校园网行为分析系统</title>
    <link rel="stylesheet" href="css/campus.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script src="js/api.js"></script>
</head>
<body>
<!-- 导航栏 -->
<div class="daohang">
    <ul>
        <li><a href="dashboard.html">首页</a></li>
        <li><a href="analysis.html">多维度分析</a></li>
        <li><a href="users.html">用户列表</a></li>
        <li><a href="warning.html" class="active">预警管理</a></li>
        <li><a href="profile.html">用户画像</a></li>
    </ul>
</div>

<!-- 主容器 -->
<div class="main-concent">
    <!-- 预警统计 -->
    <div class="card">
        <div class="card-header">⚠️ 预警统计</div>
        <div class="card-body">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div class="metric-card danger">
                    <div class="metric-label">未处理预警</div>
                    <div class="metric-value" id="unhandledCount">0</div>
                </div>
                <div class="metric-card warning">
                    <div class="metric-label">高风险用户</div>
                    <div class="metric-value" id="highRiskUserCount">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 预警类型分布 -->
    <div class="card mt-30">
        <div class="card-header">预警类型分布</div>
        <div class="card-body">
            <div id="warningTypeChart" style="height: 300px;"></div>
        </div>
    </div>

    <!-- 高风险用户 -->
    <div class="card mt-30">
        <div class="card-header">🔴 高风险用户</div>
        <div class="card-body">
            <div style="overflow-x: auto;">
                <table class="table">
                    <thead>
                    <tr>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>学院</th>
                        <th>预警数量</th>
                        <th>最高风险等级</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="highRiskTable">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 30px;">
                            <div class="spinner"></div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 未处理预警列表 -->
    <div class="card mt-30">
        <div class="card-header">📋 未处理预警列表</div>
        <div class="card-body">
            <div style="overflow-x: auto;">
                <table class="table">
                    <thead>
                    <tr>
                        <th>用户</th>
                        <th>预警类型</th>
                        <th>风险级别</th>
                        <th>风险评分</th>
                        <th>描述</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="warningTable">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 30px;">
                            <div class="spinner"></div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div class="footer">
    <p>© 2026 校园网行为分析系统 - 预警管理</p>
</div>

<script src="js/warning.js"></script>
</body>
</html>
